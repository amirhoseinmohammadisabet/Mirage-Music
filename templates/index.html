<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Local Player</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; background: #121212; color: white; }
        .player-box { background: #222; padding: 20px; border-radius: 10px; position: sticky; top: 20px; }
        audio { width: 100%; margin-top: 10px; }
        .track-list { list-style: none; padding: 0; margin-top: 30px; }
        .track-item { padding: 12px; border-bottom: 1px solid #333; cursor: pointer; transition: background 0.2s; }
        .track-item:hover { background: #333; border-radius: 5px; }
        .track-title { font-weight: bold; font-size: 1.1em; }
        .track-artist { color: #aaa; font-size: 0.9em; }
    </style>
</head>
<body>

    <div class="player-box">
        <h2>Now Playing</h2>
        <div id="now-playing-text">Select a track to start...</div>
        <audio id="audio-player" controls autoplay></audio>
    </div>

    <ul class="track-list" id="track-list">
        </ul>

    <script>
        // 1. Fetch the songs from your Flask API
        fetch('/api/tracks')
            .then(response => response.json())
            .then(tracks => {
                const list = document.getElementById('track-list');
                
                // 2. Loop through the songs and create HTML for each one
                tracks.forEach(track => {
                    let li = document.createElement('li');
                    li.className = 'track-item';
                    li.innerHTML = `
                        <div class="track-title">${track.title}</div>
                        <div class="track-artist">${track.artist} &bull; ${track.album}</div>
                    `;
                    
                    // 3. When clicked, tell the audio player to play this specific track
                    li.onclick = () => playTrack(track);
                    list.appendChild(li);
                });
            });

        function playTrack(track) {
            const player = document.getElementById('audio-player');
            // Point the audio player to your Flask audio streaming route
            player.src = `/play/${track.id}`;
            document.getElementById('now-playing-text').innerHTML = `<strong>${track.title}</strong> by ${track.artist}`;
        }
    </script>
</body>
</html>
