<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Clinical Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

    <div id="ema-modal" class="modal-overlay">
        <div class="modal-box">
            <h2>SYSTEM CHECK</h2>
            <p>Acoustic calibration required. Indicate current stress level.</p>
            <div class="stress-slider-container">
                <input type="range" id="stress-slider" min="1" max="10" value="5">
                <div class="stress-labels">
                    <span>[ 1 ] CALM</span>
                    <span>[ 10 ] CRITICAL</span>
                </div>
            </div>
            <button id="submit-mood-btn">INITIALIZE AUDIO</button>
        </div>
    </div>

    <div class="app-container">
        
        <aside class="library-panel glass-panel">
            <div class="panel-header">
                <h2>DATABASE</h2>
            </div>
            <div class="search-container">
                <input type="text" id="search-input" placeholder="SEARCH DATABASE...">
            </div>
            <ul class="track-list" id="track-list">
                </ul>
        </aside>

        <main class="control-panel">
            
            <div class="player-box glass-panel">
                <div class="now-playing-header">
                    <img id="cover-art" src="" alt="Cover" onerror="this.style.display='none'">
                    <div>
                        <h3 id="now-playing-title" style="margin: 0;">AWAITING INPUT...</h3>
                        <div id="now-playing-artist" class="artist-text">---</div>
                    </div>
                </div>
                
                <audio id="audio-player"></audio>

                <div class="slider-container">
                    <span id="current-time">0:00</span>
                    <input type="range" id="seek-bar" value="0" step="1" disabled>
                    <span id="duration">0:00</span>
                </div>

                <div class="controls">
                    <button id="prev-btn" onclick="playPrevious()">⏮</button>
                    <button id="play-pause-btn" onclick="togglePlay()">▶</button>
                    <button id="next-btn" onclick="playNext()">⏭</button>
                </div>

                <div class="slider-container volume-container">
                    <span>🔈</span>
                    <input type="range" id="volume-bar" min="0" max="1" step="0.01" value="1">
                    <span>🔊</span>
                </div>
            </div>
            
            <div class="dashboard-panel glass-panel">
                <div class="toggle-container">
                    <button id="tab-mood" class="tab-btn active" onclick="switchTab('mood')">MANUAL OVERRIDE</button>
                    <button id="tab-time" class="tab-btn" onclick="switchTab('time')">CIRCADIAN SYNC</button>
                </div>
                
                <div id="grid-mood" class="mood-grid">
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Joyful')">JOYFUL</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Inspired')">INSPIRED</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Confident')">CONFIDENT</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Grateful')">GRATEFUL</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Calm')">CALM</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Relaxed')">RELAXED</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Gloomy')">GLOOMY</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Anxious')">ANXIOUS</button>
                    <button class="mood-btn" onclick="triggerQueue('mood', 'Furious')">FURIOUS</button>
                </div>

                <div id="grid-time" class="mood-grid" style="display: none;">
                    <button class="mood-btn time-btn" onclick="triggerQueue('time', 'Morning')">🌅 MORNING</button>
                    <button class="mood-btn time-btn" onclick="triggerQueue('time', 'Noon')">☀️ NOON</button>
                    <button class="mood-btn time-btn" onclick="triggerQueue('time', 'Afternoon')">☕ AFTERNOON</button>
                    <button class="mood-btn time-btn" onclick="triggerQueue('time', 'Evening')">🌙 EVENING</button>
                </div>
                
                <div id="vibe-text"></div>
            </div>

        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
